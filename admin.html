<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>adnnstudio Admin Portal</title>
  <link rel="icon" type="image/svg+xml" href="adnn icon.svg" />
  <style>
    @import url("https://fonts.cdnfonts.com/css/aileron");
    @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap");
    
    :root {
      --accent: #272dcf;
      --red: #ff2602;
      --bg: #050506;
      --panel-bg: linear-gradient(135deg, rgba(34, 34, 38, 0.72), rgba(22, 22, 26, 0.58) 38%, rgba(14, 14, 18, 0.42));
      --input-bg: #111114;
      --text: #f5f5f7;
      --muted: rgba(245, 245, 247, 0.62);
      --line: rgba(255, 255, 255, 0.08);
      --font-body: "Aileron", ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      --font-mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      --radial-glow: radial-gradient(circle at 82% 8%, rgba(39, 45, 207, 0.14), transparent 36%);
      --linear-bg: linear-gradient(180deg, #050506, #0b0b0d);
      --glass-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 24px 70px rgba(0, 0, 0, 0.55);
      --toggle-btn-bg: rgba(255, 255, 255, 0.05);
      --toggle-btn-hover: rgba(255, 255, 255, 0.1);
    }

    /* Light Theme Overrides (Apple Light Ecosystem Layout Elements) */
    :root.light-theme {
      --bg: #f5f5f7;
      --panel-bg: linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.56));
      --input-bg: #ffffff;
      --text: #0b0b0d;
      --muted: rgba(11, 11, 13, 0.62);
      --line: rgba(0, 0, 0, 0.08);
      --radial-glow: radial-gradient(circle at 82% 8%, rgba(39, 45, 207, 0.06), transparent 36%);
      --linear-bg: linear-gradient(180deg, #fbfbfd, #f5f5f7);
      --glass-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.92), 0 22px 70px rgba(0, 0, 0, 0.08);
      --toggle-btn-bg: rgba(0, 0, 0, 0.03);
      --toggle-btn-hover: rgba(0, 0, 0, 0.06);
    }

    * { box-sizing: border-box; }
    
    html, body {
      background-color: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-weight: 300;
      margin: 0;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      background-image: var(--radial-glow), var(--linear-bg);
    }

    button, input, textarea, select { font: inherit; }

    /* Premium Blur/Glass Panels */
    .glass {
      background: var(--panel-bg);
      backdrop-filter: blur(26px) saturate(160%);
      -webkit-backdrop-filter: blur(26px) saturate(160%);
      border: 1px solid var(--line);
      box-shadow: var(--glass-shadow);
      transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: clamp(28px, 5vw, 68px) 0;
    }

    /* Portal Lock Screen Gate Framework */
    .portal-lock-gate {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #050506;
      display: grid;
      place-items: center;
      padding: 24px;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1), visibility 0.5s ease;
    }

    body.portal-unlocked .portal-lock-gate {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .lock-card {
      width: min(420px, 100%);
      border-radius: 28px;
      padding: 40px 32px;
      text-align: center;
    }

    .lock-card h2 {
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -0.05em;
      margin: 0 0 24px;
      color: #f5f5f7;
    }

    .lock-group {
      display: grid;
      gap: 16px;
      margin-bottom: 24px;
    }

    .lock-group input {
      background: #111114 !important;
      color: #f5f5f7 !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
    }
    .password-wrap {
      position: relative;
      display: grid;
    }
    .password-wrap input {
      padding-right: 52px !important;
    }
    .password-toggle {
      position: absolute;
      right: 8px;
      top: 50%;
      width: 36px;
      height: 36px;
      min-height: 36px !important;
      padding: 0 !important;
      border-radius: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,.06) !important;
      color: #f5f5f7 !important;
      box-shadow: none !important;
    }
    .password-toggle:hover {
      transform: translateY(-50%) scale(1.04) !important;
      background: rgba(255,255,255,.12) !important;
    }
    .password-toggle svg {
      width: 17px;
      height: 17px;
      display: block;
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand img {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      object-fit: cover;
      box-shadow: 0 12px 30px rgba(39, 45, 207, 0.3);
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 6vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.055em;
      font-weight: 400;
    }

    .kicker {
      margin: 0 0 8px;
      color: #5360ff;
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .panel {
      border-radius: 28px;
      padding: clamp(20px, 4vw, 42px);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 28px;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
    }

    label.full { grid-column: 1 / -1; }
    .form-field.is-hidden {
      display: none !important;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--input-bg);
      color: var(--text);
      outline: 0;
      padding: 14px 16px;
      font-family: var(--font-body);
      font-size: 14px;
      transition: border-color 0.25s, box-shadow 0.25s ease, background-color 0.4s ease, color 0.4s ease, border-color 0.4s ease;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(39, 45, 207, 0.16);
    }

    :root.light-theme input::placeholder, :root.light-theme textarea::placeholder {
      color: rgba(11, 11, 13, 0.35);
    }
    input::placeholder, textarea::placeholder {
      color: rgba(245, 245, 247, 0.3);
    }

    textarea { min-height: 124px; resize: vertical; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 24px;
    }

    .actions button, .top button, .top a, .lock-card button {
      min-height: 44px;
      border: 0;
      border-radius: 999px;
      padding: 0 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      font-family: var(--font-mono);
      font-size: 12px;
      cursor: pointer;
      transition: background 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease;
    }

    .actions button:hover, .top button:hover, .top a:hover, .lock-card button:hover {
      background: #3946ff;
      transform: translateY(-1px);
      box-shadow: 0 12px 28px rgba(39, 45, 207, 0.35);
    }

    .top a.home-btn { 
      background: var(--input-bg); 
      border: 1px solid var(--line);
      color: var(--text);
      transition: background 0.4s ease, color 0.4s ease, border-color 0.4s ease, transform 0.25s ease;
    }
    .top a.home-btn:hover { 
      background: rgba(255, 255, 255, 0.12); 
      transform: translateY(-1px);
    }
    :root.light-theme .top a.home-btn:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    /* Apple Red Logout Button Link Style */
    .top button.apple-logout-btn {
      width: 44px;
      height: 44px;
      min-height: 44px;
      padding: 0;
      border-radius: 50%;
      background: var(--red);
      color: #ffffff;
      box-shadow: 0 8px 24px rgba(255, 38, 2, 0.25);
    }
    .top button.apple-logout-btn:hover {
      background: #ff4122;
      box-shadow: 0 12px 28px rgba(255, 38, 2, 0.4);
      transform: translateY(-1px);
    }

    /* Apple Fine-Art Morphing Icon Toggle Controller */
    .apple-icon-toggle {
      width: 44px;
      height: 44px;
      min-height: 44px !important;
      padding: 0 !important;
      flex: 0 0 44px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--toggle-btn-bg);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      overflow: hidden;
      position: relative;
      transition: background-color 0.3s, border-color 0.3s, color 0.3s, transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .apple-icon-toggle:hover {
      background-color: var(--toggle-btn-hover);
      transform: scale(1.04) rotate(6deg);
    }
    .apple-icon-toggle:active {
      transform: scale(0.96);
    }
    .apple-icon-toggle svg {
      width: 20px;
      height: 20px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.85;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    
    /* Dynamic Path Rendering Group Rules */
    .apple-icon-toggle .sun-icon { display: none; }
    .apple-icon-toggle .moon-icon { display: block; }
    :root.light-theme .apple-icon-toggle .sun-icon { display: block; }
    :root.light-theme .apple-icon-toggle .moon-icon { display: none; }

    .status {
      min-height: 20px;
      margin: 18px 0 0;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 12px;
      line-height: 1.55;
    }

    .help {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .gate-error {
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 11px;
      margin: 12px 0 0;
      min-height: 16px;
    }

    @media (max-width: 760px) {
      .top { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Premium Apple-Inspired Fake Lock Credential Screen Gate -->

    <div class="lock-card glass">

  <div class="shell">
    <div class="top">
      <div class="brand">
        <img src="adnn icon.svg" alt="Adnn Studio">
        <div>
          <p class="kicker">Admin portal</p>
          <h1>Send to account.</h1>
        </div>
      </div>
      <div class="actions" style="margin-top:0; display: flex; align-items: center; gap: 12px;">
        <!-- Apple Fine-Art Morphing Icon Toggle Controller -->
        <button type="button" class="apple-icon-toggle" id="appleThemeToggle" title="Toggle System Workspace Aesthetics" aria-label="Toggle System Workspace Aesthetics">

  <!-- Local Session Authentication Verification & Theme Switcher Engine Scripts -->
  <script>
    (function manageLocalGateAndThemeSession() {
      const storageSessionKey = "adnn_portal_unlocked";
      const themeStorageKey = "adnn_portal_light_mode";
      const errorMsg = document.getElementById("gateError");
      const themeToggleBtn = document.getElementById("appleThemeToggle");
      const passwordInput = document.getElementById("gatePass");
      const passwordToggle = document.getElementById("gatePasswordToggle");
      
      // Theme Restoration Loop
      if (localStorage.getItem(themeStorageKey) === "true") {
        document.documentElement.classList.add("light-theme");
      }

      themeToggleBtn?.addEventListener("click", function() {
        const isCurrentlyLight = document.documentElement.classList.toggle("light-theme");
        localStorage.setItem(themeStorageKey, isCurrentlyLight);
      });

      passwordToggle?.addEventListener("click", function() {
        const isVisible = passwordInput.type === "text";
        passwordInput.type = isVisible ? "password" : "text";
        passwordToggle.setAttribute("aria-label", isVisible ? "Show password" : "Hide password");
        passwordToggle.setAttribute("title", isVisible ? "Show password" : "Hide password");
      });
      
      // Gate Lock Restoration Loop
      if (sessionStorage.getItem(storageSessionKey) === "true") {
        document.body.classList.add("portal-unlocked");
      }

      document.getElementById("localGateForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const user = document.getElementById("gateUser").value;
        const pass = document.getElementById("gatePass").value;

        if (user === "adhnannv" && pass === "adhnan#77.as") {
          sessionStorage.setItem(storageSessionKey, "true");
          document.body.classList.add("portal-unlocked");
          if (errorMsg) errorMsg.textContent = "";
        } else {
          if (errorMsg) errorMsg.textContent = "Invalid administrator credentials.";
        }
      });

      // Clear layout variables cleanly to force a lock screen bounce upon clicking logout
      document.getElementById("adminLogoutButton").addEventListener("click", function() {
        sessionStorage.removeItem(storageSessionKey);
        document.body.classList.remove("portal-unlocked");
        document.getElementById("gateUser").value = "";
        document.getElementById("gatePass").value = "";
      });
    })();
  </script>

  <script src="firebase-config.js"></script>
  <script src="account-data-config.js"></script>
  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { addDoc, collection, doc, getDoc, getFirestore, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const config = window.ADNN_FIREBASE_CONFIG;
    const app = config ? (getApps()[0] || initializeApp(config)) : null;
    const auth = app ? getAuth(app) : null;
    const db = app ? getFirestore(app) : null;
    const status = document.getElementById("adminStatus");
    const help = document.getElementById("adminHelp");
    
    // Read the active login footprint directly from your index session cache
    let storedSessionUser = null;
    try {
      storedSessionUser = JSON.parse(localStorage.getItem("adhnanPortfolioUser"));
    } catch(e) {}
    
    let currentUser = storedSessionUser ? { uid: "aoLzzYP6uFc12MhrYlgbuohkvTs1", email: "getavcollab@gmail.com" } : null;
    let isAdmin = storedSessionUser && storedSessionUser.email.trim().toLowerCase() === "getavcollab@gmail.com";

    function setStatus(text) {
      if (status) status.textContent = text;
    }

    function emailKey(email) {
      return String(email || "").trim().toLowerCase();
    }

    function timestampFromInput(input) {
      if (!input.value) return null;
      return Timestamp.fromDate(new Date(input.value));
    }

    function fieldValue(id) {
      return document.getElementById(id)?.value?.trim() || "";
    }

    function isFieldVisible(id) {
      const input = document.getElementById(id);
      const label = input?.closest(".form-field");
      return Boolean(input && label && !label.classList.contains("is-hidden"));
    }

    function visibleValue(id) {
      return isFieldVisible(id) ? fieldValue(id) : "";
    }

    function updateComposerFormat() {
      const type = document.getElementById("itemType").value;
      document.querySelectorAll(".form-field[data-show]").forEach((field) => {
        const visible = field.dataset.show.split(/\s+/).includes(type);
        field.classList.toggle("is-hidden", !visible);
        field.querySelectorAll("input, textarea, select").forEach((input) => {
          input.disabled = !visible;
        });
      });

      const titleInput = document.getElementById("itemTitle");
      const messageInput = document.getElementById("itemMessage");
      const buttonLabel = document.getElementById("buttonLabel");
      const fileLink = document.getElementById("fileLink");

      if (type === "notification") {
        document.getElementById("titleFieldLabel").firstChild.textContent = "Notification title";
        document.getElementById("messageFieldLabel").firstChild.textContent = "Message";
        titleInput.placeholder = "Project update";
        messageInput.placeholder = "Your logo draft is ready.";
        buttonLabel.placeholder = "Open update";
      } else if (type === "task") {
        document.getElementById("titleFieldLabel").firstChild.textContent = "Task title";
        document.getElementById("messageFieldLabel").firstChild.textContent = "Task brief";
        document.getElementById("fileLinkFieldLabel").firstChild.textContent = "Brief / file link";
        document.getElementById("dueDateFieldLabel").firstChild.textContent = "Task due date";
        titleInput.placeholder = "Logo revision brief";
        messageInput.placeholder = "Review the new direction and send feedback by the due date.";
        buttonLabel.placeholder = "Open brief";
        fileLink.placeholder = "https://drive.google.com/...";
      } else {
        document.getElementById("titleFieldLabel").firstChild.textContent = "Invoice title";
        document.getElementById("messageFieldLabel").firstChild.textContent = "Invoice note";
        document.getElementById("fileLinkFieldLabel").firstChild.textContent = "Invoice PDF link";
        document.getElementById("dueDateFieldLabel").firstChild.textContent = "Invoice due date";
        titleInput.placeholder = "Invoice for brand identity";
        messageInput.placeholder = "Invoice attached as PDF. Please review the amount and payment link.";
        fileLink.placeholder = "https://drive.google.com/.../view";
      }
    }

    function recordClientDispatch(payload) {
      const endpoint = window.ADNN_ACCOUNT_ENDPOINT;
      if (!endpoint) return;
      const form = new URLSearchParams();
      form.set("action", "recordClientMessage");
      Object.entries(payload).forEach(([key, value]) => {
        form.set(key, value === null || value === undefined ? "" : String(value));
      });
      form.set("pageUrl", location.href);
      form.set("timestamp", new Date().toISOString());
      fetch(endpoint, {
        method: "POST",
        body: form,
        mode: "no-cors",
        keepalive: true
      }).catch(() => {});
    }

    document.getElementById("itemType").addEventListener("change", updateComposerFormat);
    updateComposerFormat();

    window.addEventListener("DOMContentLoaded", async () => {
      if (isAdmin && db) {
        // Silent validation verification hook with your live Firestore settings
        const adminDoc = await getDoc(doc(db, "admins", "aoLzzYP6uFc12MhrYlgbuohkvTs1")).catch(() => null);
        if (adminDoc && adminDoc.exists()) {
          setStatus("Ready to sync.");
        } else {
          setStatus("Database warning: Please ensure your UID exists inside the admins collection.");
        }
      } else {
        setStatus("Verification warning: No active admin account detected. Sign in on home page.");
      }
    });

    document.getElementById("adminSendForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!currentUser || !isAdmin) {
        setStatus("Permission error: Authenticate as an admin first via your main login link.");
        return;
      }

      const email = emailKey(document.getElementById("clientEmail").value);
      const type = document.getElementById("itemType").value;
      const title = document.getElementById("itemTitle").value.trim();
      const message = document.getElementById("itemMessage").value.trim();

      if (!email || !title || !message) {
        setStatus("Email, title, and message are required.");
        return;
      }

      setStatus("Sending...");
      const dispatchPayload = {
        email,
        type,
        title,
        message,
        status: document.getElementById("itemStatus").value || "New",
        bannerImage: visibleValue("bannerImage"),
        publishAt: document.getElementById("publishAt").value,
        expiresAt: document.getElementById("expiresAt").value,
        fileLink: visibleValue("fileLink"),
        buttonLabel: visibleValue("buttonLabel"),
        buttonLink: visibleValue("buttonLink"),
        paymentLink: visibleValue("paymentLink"),
        dueDate: visibleValue("dueDate"),
        amount: visibleValue("amount"),
        currency: visibleValue("currency"),
        createdByEmail: currentUser.email
      };
      try {
        await addDoc(collection(db, "accountItems"), {
          email,
          type,
          title,
          message,
          status: dispatchPayload.status,
          bannerImage: dispatchPayload.bannerImage,
          publishAt: timestampFromInput(document.getElementById("publishAt")),
          expiresAt: timestampFromInput(document.getElementById("expiresAt")),
          fileLink: dispatchPayload.fileLink,
          buttonLabel: dispatchPayload.buttonLabel,
          buttonLink: dispatchPayload.buttonLink,
          paymentLink: dispatchPayload.paymentLink,
          dueDate: dispatchPayload.dueDate,
          amount: dispatchPayload.amount,
          currency: dispatchPayload.currency,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp(),
          createdBy: currentUser.uid,
          createdByEmail: currentUser.email
        });

        recordClientDispatch(dispatchPayload);
        event.target.reset();
        updateComposerFormat();
        setStatus("Sent. The client will see it in their account. Sheet log requested.");
      } catch (error) {
        console.error(error);
        setStatus("Transmission failed. Confirm Firestore network rules permit document writes.");
      }
    });
  </script>
  <script type="module" src="firebase-chat.js"></script>
</body>
</html>
