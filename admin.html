<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AdnnStudio Admin Sender</title>
  <link rel="icon" type="image/svg+xml" href="adnn icon.svg" />
  <style>
    @import url("https://fonts.cdnfonts.com/css/aileron");
    @import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap");
    :root {
      --accent:#272dcf;
      --paper:#f5f5f7;
      --ink:#0b0b0d;
      --muted:rgba(11,11,13,.62);
      --line:rgba(0,0,0,.08);
      --font-body:"Aileron", ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      --font-mono:"IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    * { box-sizing:border-box; }
    body {
      margin:0;
      min-height:100vh;
      background:radial-gradient(circle at 82% 8%, rgba(39,45,207,.16), transparent 32%), linear-gradient(180deg,#fbfbfd,var(--paper));
      color:var(--ink);
      font-family:var(--font-body);
      font-weight:300;
      -webkit-font-smoothing:antialiased;
    }
    button, input, textarea, select { font:inherit; }
    .shell {
      width:min(1120px, calc(100% - 32px));
      margin:0 auto;
      padding:clamp(28px, 5vw, 68px) 0;
    }
    .top {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
      margin-bottom:28px;
    }
    .brand {
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }
    .brand img {
      width:46px;
      height:46px;
      border-radius:16px;
      object-fit:cover;
      box-shadow:0 14px 34px rgba(39,45,207,.22);
    }
    h1 {
      margin:0;
      font-size:clamp(42px,7vw,82px);
      line-height:.92;
      letter-spacing:-.058em;
      font-weight:400;
    }
    .kicker {
      margin:0 0 12px;
      color:var(--accent);
      font-family:var(--font-mono);
      font-size:12px;
      letter-spacing:.18em;
      text-transform:uppercase;
    }
    .panel {
      border:1px solid var(--line);
      border-radius:34px;
      padding:clamp(22px,4vw,44px);
      background:linear-gradient(135deg, rgba(255,255,255,.86), rgba(255,255,255,.58));
      box-shadow:inset 0 1px 0 rgba(255,255,255,.92), 0 22px 70px rgba(0,0,0,.08);
      backdrop-filter:blur(24px) saturate(160%);
      -webkit-backdrop-filter:blur(24px) saturate(160%);
    }
    .grid {
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:14px;
      margin-top:32px;
    }
    label {
      display:grid;
      gap:8px;
      color:rgba(11,11,13,.58);
      font-family:var(--font-mono);
      font-size:11px;
    }
    label.full { grid-column:1 / -1; }
    input, textarea, select {
      width:100%;
      border:1px solid rgba(0,0,0,.10);
      border-radius:18px;
      background:#fff;
      color:var(--ink);
      outline:0;
      padding:14px 15px;
      font-family:var(--font-body);
      font-size:14px;
    }
    textarea { min-height:120px; resize:vertical; }
    .actions {
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }
    .actions button, .top button, .top a {
      min-height:44px;
      border:0;
      border-radius:999px;
      padding:0 18px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      color:#fff;
      background:var(--accent);
      text-decoration:none;
      cursor:pointer;
      box-shadow:0 16px 36px rgba(39,45,207,.24);
    }
    .top a { background:#111114; }
    .actions .secondary, .top .secondary {
      color:var(--ink);
      background:rgba(255,255,255,.72);
      border:1px solid rgba(0,0,0,.08);
      box-shadow:0 12px 30px rgba(0,0,0,.06);
    }
    .status {
      min-height:20px;
      margin:18px 0 0;
      color:var(--muted);
      font-family:var(--font-mono);
      font-size:12px;
      line-height:1.55;
    }
    .help {
      margin-top:22px;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }
    code {
      font-family:var(--font-mono);
      font-size:12px;
      background:rgba(39,45,207,.08);
      color:var(--accent);
      border-radius:8px;
      padding:2px 6px;
    }
    @media (max-width:760px) {
      .top, .grid { grid-template-columns:1fr; }
      .top { align-items:flex-start; flex-direction:column; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <div class="brand">
        <img src="adnn icon.svg" alt="Adnn Studio">
        <div>
          <p class="kicker">Admin sender</p>
          <h1>Send to account.</h1>
        </div>
      </div>
      <div class="actions" style="margin-top:0">
        <a href="index.html#home" class="secondary">Home</a>
        <button type="button" id="adminLoginButton">Google admin login</button>
        <button type="button" class="secondary" id="adminLogoutButton">Log out</button>
      </div>
    </div>

    <div class="panel">
      <p class="kicker">Message composer</p>
      <p class="help" id="adminHelp">Login with your admin Google account. If this page says you are not admin, add your Firebase UID to the <code>admins</code> collection once.</p>
      <form id="adminSendForm">
        <div class="grid">
          <label>Send to client email
            <input id="clientEmail" type="email" placeholder="client@gmail.com" required>
          </label>
          <label>Type
            <select id="itemType">
              <option value="notification">Notification</option>
              <option value="task">Task</option>
              <option value="invoice">Invoice</option>
            </select>
          </label>
          <label>Title
            <input id="itemTitle" placeholder="Project update" required>
          </label>
          <label>Status
            <select id="itemStatus">
              <option value="New">New</option>
              <option value="Published">Published</option>
              <option value="Draft">Draft</option>
              <option value="Hidden">Hidden</option>
            </select>
          </label>
          <label class="full">Message
            <textarea id="itemMessage" placeholder="Your logo draft is ready." required></textarea>
          </label>
          <label class="full">Banner image URL
            <input id="bannerImage" placeholder="https://...">
          </label>
          <label>Publish at
            <input id="publishAt" type="datetime-local">
          </label>
          <label>Expires at
            <input id="expiresAt" type="datetime-local">
          </label>
          <label>File link
            <input id="fileLink" placeholder="https://drive.google.com/...">
          </label>
          <label>Button label
            <input id="buttonLabel" placeholder="View draft">
          </label>
          <label>Button link
            <input id="buttonLink" placeholder="https://...">
          </label>
          <label>Due date / invoice date
            <input id="dueDate" type="date">
          </label>
          <label>Amount
            <input id="amount" placeholder="250">
          </label>
          <label>Currency
            <input id="currency" placeholder="USD">
          </label>
        </div>
        <div class="actions">
          <button type="submit">Send</button>
          <button type="reset" class="secondary">Clear</button>
        </div>
        <p class="status" id="adminStatus" aria-live="polite"></p>
      </form>
    </div>
  </div>

  <script src="firebase-config.js"></script>
  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, onAuthStateChanged, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { addDoc, collection, doc, getDoc, getFirestore, serverTimestamp, Timestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const config = window.ADNN_FIREBASE_CONFIG;
    const app = config ? (getApps()[0] || initializeApp(config)) : null;
    const auth = app ? getAuth(app) : null;
    const db = app ? getFirestore(app) : null;
    const provider = new GoogleAuthProvider();
    const status = document.getElementById("adminStatus");
    const help = document.getElementById("adminHelp");
    let currentUser = null;
    let isAdmin = false;

    function setStatus(text) {
      if (status) status.textContent = text;
    }

    function emailKey(email) {
      return String(email || "").trim().toLowerCase();
    }

    function timestampFromInput(input) {
      if (!input.value) return null;
      return Timestamp.fromDate(new Date(input.value));
    }

    document.getElementById("adminLoginButton").addEventListener("click", async () => {
      if (!auth) {
        setStatus("Firebase config is missing.");
        return;
      }
      await signInWithPopup(auth, provider);
    });

    document.getElementById("adminLogoutButton").addEventListener("click", async () => {
      if (auth) await signOut(auth);
    });

    onAuthStateChanged(auth, async (user) => {
      currentUser = user;
      isAdmin = false;
      if (!user) {
        help.innerHTML = "Login with your admin Google account.";
        setStatus("Not logged in.");
        return;
      }

      const adminDoc = await getDoc(doc(db, "admins", user.uid)).catch(() => null);
      isAdmin = Boolean(adminDoc && adminDoc.exists());
      if (isAdmin) {
        help.textContent = `Admin ready: ${user.email}`;
        setStatus("Ready to send.");
      } else {
        help.innerHTML = `Logged in as ${user.email}, but this UID is not admin yet: <code>${user.uid}</code>. Add a document with this UID in Firestore collection <code>admins</code>.`;
        setStatus("Admin access missing.");
      }
    });

    document.getElementById("adminSendForm").addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!currentUser || !isAdmin) {
        setStatus("Login as an admin first.");
        return;
      }

      const email = emailKey(document.getElementById("clientEmail").value);
      const type = document.getElementById("itemType").value;
      const title = document.getElementById("itemTitle").value.trim();
      const message = document.getElementById("itemMessage").value.trim();

      if (!email || !title || !message) {
        setStatus("Email, title, and message are required.");
        return;
      }

      setStatus("Sending...");
      await addDoc(collection(db, "accountItems"), {
        email,
        type,
        title,
        message,
        status: document.getElementById("itemStatus").value || "New",
        bannerImage: document.getElementById("bannerImage").value.trim(),
        publishAt: timestampFromInput(document.getElementById("publishAt")),
        expiresAt: timestampFromInput(document.getElementById("expiresAt")),
        fileLink: document.getElementById("fileLink").value.trim(),
        buttonLabel: document.getElementById("buttonLabel").value.trim(),
        buttonLink: document.getElementById("buttonLink").value.trim(),
        dueDate: document.getElementById("dueDate").value,
        amount: document.getElementById("amount").value.trim(),
        currency: document.getElementById("currency").value.trim(),
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp(),
        createdBy: currentUser.uid,
        createdByEmail: currentUser.email
      });

      event.target.reset();
      setStatus("Sent. The client will see it in their account.");
    });
  </script>
</body>
</html>
